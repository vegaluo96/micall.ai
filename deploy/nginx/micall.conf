# MiCall 用户端 H5 —— zsky.com
# 复制到 /etc/nginx/sites-available/micall 并软链到 sites-enabled。
# 静态产物来自 `cd frontend && npm run build` 的 frontend/dist。

server {
    listen 80;
    listen [::]:80;
    server_name zsky.com www.zsky.com;

    root /var/www/micall;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── 后端就绪后：实时控制信令 WSS 反代（与 frontend 的 VITE_SIGNALING_URL 对应）──
    # location /realtime/signal {
    #     proxy_pass http://127.0.0.1:8080;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    #     proxy_set_header Host $host;
    #     proxy_read_timeout 3600s;
    # }
}
