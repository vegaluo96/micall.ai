# MiCall 运营管理端 —— admin.zsky.com
# 复制到 /etc/nginx/sites-available/micall-admin 并软链到 sites-enabled。
# 静态产物来自 `cd admin && npm run build` 的 admin/dist。
#
# ⚠️ 这是内部后台，应用本身没有登录鉴权 —— 必须靠 nginx 做访问控制。
#    下面用 HTTP Basic Auth；更严可叠加 IP allowlist（allow/deny）。

server {
    listen 80;
    listen [::]:80;
    server_name admin.zsky.com;

    root /var/www/micall-admin;
    index index.html;

    # ── 访问控制（先建密码文件，见 deploy/README.md）──
    auth_basic "MiCall Admin";
    auth_basic_user_file /etc/nginx/.micall_admin_htpasswd;
    # 可选：仅允许办公网/VPN 出口 IP
    # allow 203.0.113.0/24;
    # deny all;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── 后端就绪后：管理 API 反代（与 admin 的 VITE_API_BASE 对应）──
    # 「接口配置」的 endpoint/key 读写、连通性测试走这条链路：
    #   GET/PUT  /admin/api-config
    #   POST     /admin/api-config/test
    # location /admin/ {
    #     proxy_pass http://127.0.0.1:8080;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }
}
